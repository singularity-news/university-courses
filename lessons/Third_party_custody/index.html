<script>function preloadFonts(fontsList){const head=document.head||document.getElementsByTagName("head")[0];fontsList.forEach((url)=>{const link=document.createElement("link");link.rel="preload";link.href=url;link.as="font";link.crossOrigin="anonymous";const ext=url.split(".").pop().toLowerCase();switch(ext){case"woff":link.type="font/woff";break;case"woff2":link.type="font/woff2";break;case"ttf":link.type="font/ttf";break;case"otf":link.type="font/otf";break;default:link.type="font/ttf";}head.appendChild(link);});}preloadFonts(fontsList);</script>
<style>
  body,html{margin:0;padding:0;height:100%;overflow:hidden}
  #content{position:absolute;left:0;right:0;bottom:0;top:0}

  /* Hide Mindsmith badge */
  a[href*="mindsmith.ai"]{display:none!important;visibility:hidden!important;pointer-events:none!important}

  /* Back Home button – normal flow, no fixed/sticky/absolute */
  #back-home-btn{
    display:flex!important;
    align-items:center;
    gap:10px;
    width:100%;
    box-sizing:border-box;
    padding:12px 16px;
    background:transparent;
    color:inherit;
    font:inherit;
    font-size:inherit;
    text-decoration:none;
    cursor:pointer;
    text-align:left;
    opacity:0.85;
    border:none;
    border-top:1px solid rgba(255,255,255,0.15);
    transition:opacity .2s,background .2s;
  }
  #back-home-btn:hover{opacity:1;background:rgba(255,255,255,0.08)}
  #back-home-btn svg{flex-shrink:0}
</style>
<link href="main.css" rel="stylesheet">
</head><body>
<script id="lessonscript" data-scorm-version="%DATA_SCORM_VERSION%" src="static-scorm-interface.js"></script>
<script src="lesson-data.js"></script>
<script src="languages.js"></script>
<script src="static-learner-strings.js"></script>
<div id="root"></div>
<script defer="defer" src="main.js"></script>

<script>
(function(){
  'use strict';
  var HOME_URL = "https://singularity41.wordpress.com/";

  /* ── Badge: hide only, never remove ── */
  function sweepBadges(){
    try{
      document.querySelectorAll('a[href*="mindsmith.ai"]').forEach(function(a){
        if(a.isConnected){
          a.style.setProperty('display','none','important');
          a.style.setProperty('visibility','hidden','important');
        }
      });
    }catch(e){}
  }

  function createButton(){
    var a=document.createElement('a');
    a.id='back-home-btn';
    a.href=HOME_URL;
    a.target='_blank';
    a.rel='noopener noreferrer';
    a.setAttribute('aria-label','Back to Home');
    a.innerHTML=
      '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"'+
      ' fill="none" stroke="currentColor" stroke-width="2"'+
      ' stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">'+
      '<path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>'+
      '<polyline points="9 22 9 12 15 12 15 22"/></svg>'+
      '<span>Back Home</span>';
    return a;
  }

  var SIDEBAR_SELECTORS=[
    '[class*="sidebar"]','[class*="Sidebar"]',
    '[class*="side-bar"]','[class*="side_bar"]',
    '[class*="nav-panel"]','[class*="NavPanel"]',
    '[class*="drawer"]','[class*="Drawer"]',
    'nav','[role="navigation"]'
  ];

  function findSidebar(){
    for(var i=0;i<SIDEBAR_SELECTORS.length;i++){
      try{
        var el=document.querySelector(SIDEBAR_SELECTORS[i]);
        if(el) return el;
      }catch(e){}
    }
    return null;
  }

  /*
   * PERMANENT RULE:
   * Button goes ONLY inside the open sidebar as the very last entry.
   * Never on body. Never fixed. Never outside the sidebar.
   *
   * - Sidebar set to flex-column so last child = visually bottom
   * - Button appended directly to sidebar (not into React-controlled <ul>)
   * - Observer re-appends if React pushes anything after it
   */
  function ensureLast(){
    sweepBadges();
    var sidebar=findSidebar();
    if(!sidebar) return;

    sidebar.style.setProperty('display','flex','important');
    sidebar.style.setProperty('flex-direction','column','important');

    var btn=document.getElementById('back-home-btn');
    if(btn){
      if(sidebar.lastElementChild!==btn) sidebar.appendChild(btn);
    } else {
      sidebar.appendChild(createButton());
    }
  }

  /* Poll until sidebar is rendered */
  var n=0;
  var poll=setInterval(function(){
    n++; ensureLast();
    if(document.getElementById('back-home-btn')||n>=80) clearInterval(poll);
  },100);

  /* Observer – keeps button at bottom whenever React mutates DOM */
  var t=null;
  new MutationObserver(function(){
    clearTimeout(t);
    t=setTimeout(ensureLast,60);
  }).observe(document.body,{childList:true,subtree:true});

})();
</script>
</body></html>
