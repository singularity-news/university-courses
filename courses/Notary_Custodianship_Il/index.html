<!-- Back Home button – always last child of sidebar container -->
<script>
(function () {
  'use strict';

  var HOME_URL = "https://singularity41.wordpress.com/";

  /* ── Badge removal ── */
  function removeBadge() {
    try {
      document.querySelectorAll('a[href*="mindsmith.ai"]').forEach(function (a) {
        try {
          if (!a.isConnected) return;
          a.style.setProperty('display',    'none',   'important');
          a.style.setProperty('visibility', 'hidden', 'important');
        } catch (e) {}
      });
    } catch (e) {}
  }

  /* ── Create button ── */
  function createButton() {
    var a = document.createElement('a');
    a.id     = 'back-home-btn';
    a.href   = HOME_URL;
    a.target = '_blank';
    a.rel    = 'noopener noreferrer';
    a.setAttribute('aria-label', 'Back to Home');
    a.innerHTML =
      '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"' +
      ' fill="none" stroke="currentColor" stroke-width="2"' +
      ' stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">' +
      '<path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>' +
      '<polyline points="9 22 9 12 15 12 15 22"/></svg>' +
      '<span>Back Home</span>';
    return a;
  }

  /* ── Find the sidebar CONTAINER (not the inner <ul>) ── */
  var SIDEBAR_SELECTORS = [
    '[class*="sidebar"]', '[class*="Sidebar"]',
    '[class*="side-bar"]', '[class*="side_bar"]',
    '[class*="nav-panel"]', '[class*="NavPanel"]',
    '[class*="drawer"]',   '[class*="Drawer"]',
    'nav', '[role="navigation"]'
  ];

  function findSidebar() {
    for (var i = 0; i < SIDEBAR_SELECTORS.length; i++) {
      try {
        var el = document.querySelector(SIDEBAR_SELECTORS[i]);
        if (el) return el;
      } catch (e) {}
    }
    return null;
  }

  /* ── Ensure button is always the LAST child of the sidebar ── */
  function ensureButtonAtBottom() {
    removeBadge();

    var sidebar = findSidebar();
    if (!sidebar) return;

    var existing = document.getElementById('back-home-btn');

    if (existing) {
      // If already last child of this sidebar, nothing to do
      if (sidebar.lastElementChild === existing) return;
      // Otherwise move it to the end
      sidebar.appendChild(existing);
    } else {
      // First injection
      sidebar.appendChild(createButton());
    }
  }

  /* ── Poll until sidebar is rendered ── */
  var attempts = 0;
  var pollTimer = setInterval(function () {
    attempts++;
    ensureButtonAtBottom();
    if (document.getElementById('back-home-btn') || attempts >= 60) {
      clearInterval(pollTimer);
    }
  }, 100);

  /* ── MutationObserver: re-check position on every DOM change ──
     This catches React re-rendering new items after the button */
  var debounceTimer = null;
  var observer = new MutationObserver(function () {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(function () {
      ensureButtonAtBottom();
    }, 100);
  });

  observer.observe(document.body, { childList: true, subtree: true });

})();
</script>
