<!-- Back Home button injected into sidebar nav list -->
<script>
(function () {
  'use strict';

  var HOME_URL = "https://singularity41.wordpress.com/";

  /* ── Badge removal (hide only, no DOM removal) ── */
  function removeBadge() {
    try {
      document.querySelectorAll('a[href*="mindsmith.ai"]').forEach(function (a) {
        try {
          if (!a.isConnected) return;
          a.style.setProperty('display',    'none',   'important');
          a.style.setProperty('visibility', 'hidden', 'important');
        } catch (e) {}
      });
    } catch (e) {}
  }

  /* ── Create the Back Home anchor ── */
  function createButton() {
    var a = document.createElement('a');
    a.id     = 'back-home-btn';
    a.href   = HOME_URL;
    a.target = '_blank';
    a.rel    = 'noopener noreferrer';
    a.setAttribute('aria-label', 'Back to Home');
    a.innerHTML =
      '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"' +
      ' fill="none" stroke="currentColor" stroke-width="2"' +
      ' stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">' +
      '<path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>' +
      '<polyline points="9 22 9 12 15 12 15 22"/></svg>' +
      '<span>Back Home</span>';
    return a;
  }

  /* ── Find innermost nav list inside sidebar ── */
  var SIDEBAR_SELECTORS = [
    '[class*="sidebar"]', '[class*="Sidebar"]',
    '[class*="side-bar"]', '[class*="side_bar"]',
    '[class*="nav-panel"]', '[class*="NavPanel"]',
    '[class*="drawer"]',   '[class*="Drawer"]',
    'nav', '[role="navigation"]'
  ];

  function findNavContainer() {
    for (var i = 0; i < SIDEBAR_SELECTORS.length; i++) {
      try {
        var sidebar = document.querySelector(SIDEBAR_SELECTORS[i]);
        if (!sidebar) continue;
        var list = sidebar.querySelector('ul, ol');
        if (list) return { container: list, asList: true };
        return { container: sidebar, asList: false };
      } catch (e) {}
    }
    return null;
  }

  /* ── Inject button as last item in nav list ── */
  function inject() {
    removeBadge();
    if (document.getElementById('back-home-btn')) return;
    var found = findNavContainer();
    if (!found) return;
    var btn = createButton();
    if (found.asList) {
      var li = document.createElement('li');
      li.id = 'back-home-li';
      li.appendChild(btn);
      found.container.appendChild(li);
    } else {
      found.container.appendChild(btn);
    }
  }

  /* ── Poll until React has rendered the sidebar ── */
  var attempts = 0;
  var pollTimer = setInterval(function () {
    attempts++;
    inject();
    if (document.getElementById('back-home-btn') || attempts >= 60) {
      clearInterval(pollTimer);
    }
  }, 100);

  /* ── MutationObserver (debounced) ── */
  var debounceTimer = null;
  var observer = new MutationObserver(function () {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(function () {
      removeBadge();
      if (!document.getElementById('back-home-btn')) inject();
    }, 150);
  });

  observer.observe(document.body, { childList: true, subtree: true });

})();
</script>
