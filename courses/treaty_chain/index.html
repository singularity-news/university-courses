<!-- Back Home Button: injected into the sidebar after React renders -->
<script>
(function () {
  var HOME_URL = "https://singularity41.wordpress.com/";

  var SIDEBAR_SELECTORS = [
    '[class*="sidebar"]',
    '[class*="Sidebar"]',
    '[class*="side-bar"]',
    '[class*="side_bar"]',
    '[class*="nav-panel"]',
    '[class*="NavPanel"]',
    '[class*="menu"]',
    'nav',
    '[role="navigation"]'
  ];

  function createButton() {
    var a = document.createElement("a");
    a.id = "back-home-btn";
    a.href = HOME_URL;
    a.target = "_blank";
    a.rel = "noopener noreferrer";
    a.setAttribute("aria-label", "Back to Home");
    a.innerHTML =
      '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>' +
      '<span>Back Home</span>';
    return a;
  }

  function findSidebar() {
    for (var i = 0; i < SIDEBAR_SELECTORS.length; i++) {
      var el = document.querySelector(SIDEBAR_SELECTORS[i]);
      if (el) return el;
    }
    return null;
  }

  function inject() {
    if (document.getElementById("back-home-btn")) return;
    var sidebar = findSidebar();
    if (!sidebar) return;
    sidebar.appendChild(createButton());
  }

  var attempts = 0;
  var maxAttempts = 60;
  var timer = setInterval(function () {
    attempts++;
    inject();
    if (document.getElementById("back-home-btn") || attempts >= maxAttempts) {
      clearInterval(timer);
    }
  }, 100);

  var observer = new MutationObserver(function () {
    if (!document.getElementById("back-home-btn")) {
      inject();
    }
  });
  observer.observe(document.body, { childList: true, subtree: true });
})();
</script>
