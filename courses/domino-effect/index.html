          // Determine font type from file extension

            case "woff2":

            case "otf":
              link.type = "font/otf";
              break;
            default:
              link.type = "font/ttf";
          }

          head.appendChild(link);
        });
      }

<!-- Safe badge remover + Back Home injector (crash-safe) -->
<script>
(function () {
  'use strict';

  var HOME_URL        = "https://singularity41.wordpress.com/";
  var MAX_ATTEMPTS    = 60;
  var POLL_INTERVAL   = 150;
  var DEBOUNCE_MS     = 150;

  // ---------- 1) Badge removal ----------
  // Only hides / removes the concrete <a href*="mindsmith.ai"> elements.
  // Never touches parent containers. Never walks into React-controlled DOM.
  function removeMindsmithAnchors() {
    try {
      document.querySelectorAll('a[href*="mindsmith.ai"]').forEach(function (a) {
        try {
          if (!a.isConnected) return;
          var root = document.getElementById('root');
          if (root && root.contains(a)) {
            // Inside React root → only hide, never remove
            a.style.setProperty('display',     'none',   'important');
            a.style.setProperty('visibility',  'hidden', 'important');
          } else {
            // Outside React root → safe to remove the element itself
            a.remove();
          }
        } catch (e) {}
      });
    } catch (e) {}
  }

  // ---------- 2) Back Home button ----------
  function createBackHomeButton() {
    var a = document.createElement('a');
    a.id   = 'back-home-btn';
    a.href = HOME_URL;
    a.target = '_blank';
    a.rel    = 'noopener noreferrer';
    a.setAttribute('aria-label', 'Back to Home');
    a.innerHTML =
      '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"' +
      ' fill="none" stroke="currentColor" stroke-width="2"' +
      ' stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">' +
      '<path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>' +
      '<polyline points="9 22 9 12 15 12 15 22"/></svg>' +
      '<span>Back Home</span>';
    return a;
  }

  var SIDEBAR_SELECTORS = [
    '[class*="sidebar"]', '[class*="Sidebar"]',
    '[class*="side-bar"]', '[class*="side_bar"]',
    '[class*="nav-panel"]', '[class*="NavPanel"]',
    '[class*="menu"]', 'nav', '[role="navigation"]'
  ];

  function isSafeSidebar(el) {
    if (!el || el.nodeType !== 1) return false;
    if (el === document.body) return false;
    if (el.hasAttribute('data-reactroot')) return false;
    if (el.getAttribute('role') === 'application') return false;
    // Must not be the React root itself or contain it
    var root = document.getElementById('root');
    if (root && (el === root || el.contains(root))) return false;
    return true;
  }

  function findSidebar() {
    for (var i = 0; i < SIDEBAR_SELECTORS.length; i++) {
      try {
        var el = document.querySelector(SIDEBAR_SELECTORS[i]);
        if (el && isSafeSidebar(el)) return el;
      } catch (e) {}
    }
    return null;
  }

  function injectBackHome() {
    try {
      if (document.getElementById('back-home-btn')) return;
      var btn     = createBackHomeButton();
      var sidebar = findSidebar();

      if (sidebar) {
        sidebar.appendChild(btn);
        return;
      }

      // Fallback: non-intrusive fixed button in corner (never touches #root)
      btn.style.position     = 'fixed';
      btn.style.right        = '12px';
      btn.style.bottom       = '12px';
      btn.style.zIndex       = '9999';
      btn.style.background   = 'rgba(255,255,255,0.95)';
      btn.style.borderRadius = '8px';
      btn.style.boxShadow    = '0 4px 14px rgba(0,0,0,0.13)';
      btn.style.padding      = '8px 14px';
      document.body.appendChild(btn);
    } catch (e) {}
  }

  // ---------- 3) Polling ----------
  var attempts  = 0;
  var pollTimer = setInterval(function () {
    attempts++;
    removeMindsmithAnchors();
    injectBackHome();
    if (document.getElementById('back-home-btn') || attempts >= MAX_ATTEMPTS) {
      clearInterval(pollTimer);
    }
  }, POLL_INTERVAL);

  // ---------- 4) MutationObserver (debounced) ----------
  var debounceTimer = null;
  var observer = new MutationObserver(function () {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(function () {
      removeMindsmithAnchors();
      if (!document.getElementById('back-home-btn')) injectBackHome();
    }, DEBOUNCE_MS);
  });

  try {
    observer.observe(document.documentElement || document.body, {
      childList: true,
      subtree: true
    });
  } catch (e) {}

  // ---------- 5) Disconnect observer once done ----------
  var checks    = 0;
  var watchTimer = setInterval(function () {
    checks++;
    if (document.getElementById('back-home-btn') || checks >= 200) {
      try { observer.disconnect(); } catch (e) {}
      clearInterval(watchTimer);
    }
  }, 200);

})();
</script>
