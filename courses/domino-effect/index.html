<script id="lessonscript" data-scorm-version="%DATA_SCORM_VERSION%" src="static-scorm-interface.js"></script>
<script src="course-data.js"></script>
<script src="languages.js"></script>

<div id="root"></div>
<script defer="defer" src="course.js"></script>

<script>
(function(){
  'use strict';
  var HOME_URL = "https://singularity41.wordpress.com/";

  /* ── Badge removal ── */
  function removeBadge(){
    try{
      document.querySelectorAll('a[href*="mindsmith.ai"]').forEach(function(a){
        try{
          if(!a.isConnected)return;
          a.style.setProperty('display','none','important');
          a.style.setProperty('visibility','hidden','important');
        }catch(e){}
      });
    }catch(e){}
  }

  /* ── Create button ── */
  function createButton(){
    var a=document.createElement('a');
    a.id='back-home-btn';
    a.href=HOME_URL;
    a.target='_blank';
    a.rel='noopener noreferrer';
    a.setAttribute('aria-label','Back to Home');
    a.innerHTML=
      '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"'+
      ' fill="none" stroke="currentColor" stroke-width="2"'+
      ' stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">'+
      '<path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>'+
      '<polyline points="9 22 9 12 15 12 15 22"/></svg>'+
      '<span>Back Home</span>';
    return a;
  }

  /* ── Find sidebar ── */
  var SELECTORS=[
    '[class*="sidebar"]','[class*="Sidebar"]',
    '[class*="side-bar"]','[class*="side_bar"]',
    '[class*="nav-panel"]','[class*="NavPanel"]',
    '[class*="drawer"]','[class*="Drawer"]',
    'nav','[role="navigation"]'
  ];

  function findSidebar(){
    for(var i=0;i<SELECTORS.length;i++){
      try{var el=document.querySelector(SELECTORS[i]);if(el)return el;}catch(e){}
    }
    return null;
  }

  /*
   * Key strategy:
   * 1. Find the <ul> inside the sidebar (React controls this list)
   * 2. Insert the button as a SIBLING *after* the <ul>, not inside it
   *    → React cannot push it around because it doesn't own that slot
   * 3. If no <ul>, fall back to appending to the sidebar container
   * 4. Observer re-checks: if button is no longer the last child, move it back
   */
  function ensureButtonAtBottom(){
    removeBadge();
    var sidebar=findSidebar();
    if(!sidebar)return;

    var existing=document.getElementById('back-home-btn');

    // Find the nav <ul> / <ol> that React renders lesson items into
    var navList=sidebar.querySelector('ul,ol');

    // Target parent: either the ul's parent (to be a sibling after ul)
    // or the sidebar itself
    var target=navList ? navList.parentElement : sidebar;
    if(!target)target=sidebar;

    if(existing){
      // Already in correct spot?
      if(target.lastElementChild===existing)return;
      // Re-append to end
      target.appendChild(existing);
    }else{
      target.appendChild(createButton());
    }
  }

  /* ── Poll ── */
  var attempts=0;
  var poll=setInterval(function(){
    attempts++;
    ensureButtonAtBottom();
    if(document.getElementById('back-home-btn')||attempts>=80){clearInterval(poll);}
  },100);

  /* ── Observer: fires whenever React mutates the sidebar list ── */
  var dbt=null;
  var obs=new MutationObserver(function(){
    clearTimeout(dbt);
    dbt=setTimeout(ensureButtonAtBottom,80);
  });
  obs.observe(document.body,{childList:true,subtree:true});

})();
</script>
</body></html>
