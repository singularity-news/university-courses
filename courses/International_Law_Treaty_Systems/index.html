          const link = document.createElement("link");
          link.rel = "preload"; link.href = url; link.as = "font"; link.crossOrigin = "anonymous";
          const ext = url.split(".").pop().toLowerCase();
          switch (ext) {
            case "woff":  link.type = "font/woff";  break;
            case "woff2": link.type = "font/woff2"; break;
            case "ttf":   link.type = "font/ttf";   break;
            case "otf":   link.type = "font/otf";   break;
            default:      link.type = "font/ttf";
          }
          head.appendChild(link);
        });
      }

<script id="lessonscript" data-scorm-version="%DATA_SCORM_VERSION%" src="static-scorm-interface.js"></script>
<script src="course-data.js"></script>
<script src="languages.js"></script>
<script src="static-learner-strings.js"></script>
<div id="root"></div>
<script defer="defer" src="course.js"></script>

<script>
(function(){
  'use strict';
  var HOME_URL = "https://singularity41.wordpress.com/";

  /* ── Badge removal ── */
  function removeBadge(){
    try{
      document.querySelectorAll('a[href*="mindsmith.ai"]').forEach(function(a){
        try{
          if(!a.isConnected)return;
          a.style.setProperty('display','none','important');
          a.style.setProperty('visibility','hidden','important');
        }catch(e){}
      });
    }catch(e){}
  }

  /* ── Create button ── */
  function createButton(){
    var a=document.createElement('a');
    a.id='back-home-btn';
    a.href=HOME_URL;
    a.target='_blank';
    a.rel='noopener noreferrer';
    a.setAttribute('aria-label','Back to Home');
    a.innerHTML=
      '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"'+
      ' fill="none" stroke="currentColor" stroke-width="2"'+
      ' stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">'+
      '<path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>'+
      '<polyline points="9 22 9 12 15 12 15 22"/></svg>'+
      '<span>Back Home</span>';
    return a;
  }

  /* ── Find sidebar ── */
  var SELECTORS=[
    '[class*="sidebar"]','[class*="Sidebar"]',
    '[class*="side-bar"]','[class*="side_bar"]',
    '[class*="nav-panel"]','[class*="NavPanel"]',
    '[class*="drawer"]','[class*="Drawer"]',
    'nav','[role="navigation"]'
  ];

  function findSidebar(){
    for(var i=0;i<SELECTORS.length;i++){
      try{var el=document.querySelector(SELECTORS[i]);if(el)return el;}catch(e){}
    }
    return null;
  }

  /*
   * Button is inserted as SIBLING *after* the <ul> React controls,
   * not inside it – so React cannot push it around.
   * Observer re-checks and moves it back to last position if needed.
   */
  function ensureButtonAtBottom(){
    removeBadge();
    var sidebar=findSidebar();
    if(!sidebar)return;

    var existing=document.getElementById('back-home-btn');
    var navList=sidebar.querySelector('ul,ol');
    var target=navList ? navList.parentElement : sidebar;
    if(!target)target=sidebar;

    if(existing){
      if(target.lastElementChild===existing)return;
      target.appendChild(existing);
    }else{
      target.appendChild(createButton());
    }
  }

  /* ── Poll until React has rendered the sidebar ── */
  var attempts=0;
  var poll=setInterval(function(){
    attempts++;
    ensureButtonAtBottom();
    if(document.getElementById('back-home-btn')||attempts>=80){clearInterval(poll);}
  },100);

  /* ── Observer: re-check whenever React mutates the DOM ── */
  var dbt=null;
  var obs=new MutationObserver(function(){
    clearTimeout(dbt);
    dbt=setTimeout(ensureButtonAtBottom,80);
  });
  obs.observe(document.body,{childList:true,subtree:true});

})();
</script>
