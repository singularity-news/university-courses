          switch (ext) {
            case "woff":  link.type = "font/woff";  break;

            case "ttf":   link.type = "font/ttf";   break;

          }
          head.appendChild(link);
        });

<script id="lessonscript" data-scorm-version="%DATA_SCORM_VERSION%" src="static-scorm-interface.js"></script>
<script src="course-data.js"></script>
<script src="languages.js"></script>
<script src="static-learner-strings.js"></script>
<div id="root"></div>
<script defer="defer" src="course.js"></script>

<script>
(function(){
  'use strict';
  var HOME_URL = "https://singularity41.wordpress.com/";

  /* Hide badge – never remove, never touch its parent */
  function sweepBadges(){
    try{
      document.querySelectorAll('a[href*="mindsmith.ai"]').forEach(function(a){
        try{
          if(!a.isConnected) return;
          a.style.setProperty('display','none','important');
          a.style.setProperty('visibility','hidden','important');
        }catch(e){}
      });
    }catch(e){}
  }

  /* Create <li> wrapping the <a> button */
  function createItem(){
    var li = document.createElement('li');
    li.id = 'back-home-li';
    var a = document.createElement('a');
    a.id = 'back-home-btn';
    a.href = HOME_URL;
    a.target = '_blank';
    a.rel = 'noopener noreferrer';
    a.setAttribute('aria-label','Back to Home');
    a.innerHTML =
      '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"'+
      ' fill="none" stroke="currentColor" stroke-width="2"'+
      ' stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">'+
      '<path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>'+
      '<polyline points="9 22 9 12 15 12 15 22"/></svg>'+
      '<span>Back Home</span>';
    li.appendChild(a);
    return li;
  }

  /*
   * Find the sidebar <ul> that contains the lesson index.
   * Only sidebar/nav elements – never body, never #root directly.
   */
  var SELECTORS = [
    '[class*="sidebar"]','[class*="Sidebar"]',
    '[class*="side-bar"]','[class*="side_bar"]',
    '[class*="nav-panel"]','[class*="NavPanel"]',
    '[class*="drawer"]','[class*="Drawer"]',
    'nav','[role="navigation"]'
  ];

  function findNavList(){
    for(var i=0; i<SELECTORS.length; i++){
      try{
        var sidebar = document.querySelector(SELECTORS[i]);
        if(!sidebar) continue;
        var ul = sidebar.querySelector('ul,ol');
        if(ul) return ul;
      }catch(e){}
    }
    return null;
  }

  /*
   * Ensure our <li> is always the LAST child of the nav <ul>.
   * Called on every DOM mutation so React can never push it upward.
   * NO fallback outside the sidebar – if not found, do nothing.
   */
  function ensureLast(){
    sweepBadges();
    var ul = findNavList();
    if(!ul) return;                          // sidebar not open/rendered yet → wait

    var li = document.getElementById('back-home-li');
    if(li){
      if(ul.lastElementChild !== li){
        ul.appendChild(li);                  // React added items after us → move back
      }
    } else {
      ul.appendChild(createItem());          // first injection
    }
  }

  /* Poll until sidebar is rendered */
  var attempts = 0;
  var poll = setInterval(function(){
    attempts++;
    ensureLast();
    if(document.getElementById('back-home-li') || attempts >= 80){
      clearInterval(poll);
    }
  }, 100);

  /* Observer – re-runs ensureLast whenever React mutates the DOM */
  var dbt = null;
  new MutationObserver(function(){
    clearTimeout(dbt);
    dbt = setTimeout(ensureLast, 80);
  }).observe(document.body, {childList:true, subtree:true});

})();
</script>
</body></html>
