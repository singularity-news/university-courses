<script id="lessonscript" data-scorm-version="%DATA_SCORM_VERSION%" src="static-scorm-interface.js"></script>
<script src="course-data.js"></script>

<script defer="defer" src="course.js"></script>

<script>
(function(){
  'use strict';
  var HOME_URL = "https://singularity41.wordpress.com/";

  function createButton(){
    var a = document.createElement('a');
    a.id = 'back-home-btn';
    a.href = HOME_URL;
    a.target = '_blank';
    a.rel = 'noopener noreferrer';
    a.setAttribute('aria-label', 'Back to Home');
    a.innerHTML =
      '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"' +
      ' fill="none" stroke="currentColor" stroke-width="2"' +
      ' stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">' +
      '<path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>' +
      '<polyline points="9 22 9 12 15 12 15 22"/></svg>' +
      '<span>Back Home</span>';
    return a;
  }

  function hideBadge(a){
    a.style.setProperty('display','none','important');
    a.style.setProperty('visibility','hidden','important');
  }

  /*
   * Strategy: the Mindsmith badge <a href*="mindsmith.ai"> is already
   * rendered at the very bottom of the sidebar by Mindsmith itself.
   * We replace it in-place with our Back Home button.
   * This guarantees the button ends up exactly where the badge was – bottom.
   *
   * Fallback: if badge not found yet, append to the last known sidebar el.
   */
  function inject(){
    if(document.getElementById('back-home-btn')) return;

    // PRIMARY: find the badge and replace it in-place
    var badge = document.querySelector('a[href*="mindsmith.ai"]');
    if(badge){
      hideBadge(badge);
      var btn = createButton();
      // Insert our button right before the (now hidden) badge
      badge.parentNode.insertBefore(btn, badge);
      return;
    }

    // FALLBACK: badge not rendered yet – append to sidebar container
    var SELECTORS = [
      '[class*="sidebar"]','[class*="Sidebar"]',
      '[class*="side-bar"]','[class*="side_bar"]',
      '[class*="nav-panel"]','[class*="NavPanel"]',
      '[class*="drawer"]','[class*="Drawer"]',
      'nav','[role="navigation"]'
    ];
    for(var i=0; i<SELECTORS.length; i++){
      try{
        var el = document.querySelector(SELECTORS[i]);
        if(el){ el.appendChild(createButton()); return; }
      }catch(e){}
    }
  }

  /* Hide any badge that appears (even after re-renders) */
  function sweepBadges(){
    document.querySelectorAll('a[href*="mindsmith.ai"]').forEach(function(a){
      if(a.isConnected) hideBadge(a);
    });
  }

  function run(){
    sweepBadges();
    inject();
  }

  /* Poll */
  var attempts = 0;
  var poll = setInterval(function(){
    attempts++;
    run();
    if(document.getElementById('back-home-btn') || attempts >= 80){
      clearInterval(poll);
    }
  }, 100);

  /* Observer */
  var dbt = null;
  new MutationObserver(function(){
    clearTimeout(dbt);
    dbt = setTimeout(function(){
      sweepBadges();
      if(!document.getElementById('back-home-btn')) inject();
    }, 80);
  }).observe(document.body, {childList:true, subtree:true});

})();
</script>
