<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Singularity University</title>
  <script>
    // GitHub Pages SPA redirect — encodes the path into a query string
    // so the server serves index.html, which then restores the URL.
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1).join('/') +
      '/?p=' + encodeURIComponent(l.pathname + l.search) +
      (l.hash || '')
    );
  </script>
</head>
<body>Redirecting…</body>
</html>
